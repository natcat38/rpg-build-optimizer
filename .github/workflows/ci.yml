name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run docs:check
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      # Generated dataset must stay in sync with its build script + genshin-db.
      - run: npm run build:data
      - run: git diff --exit-code src/game/genshin/data.generated.json
