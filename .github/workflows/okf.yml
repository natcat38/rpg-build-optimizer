name: OKF
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Validate knowledge/ bundle against the house standard
        uses: natcat38/okf-portfolio-standard@v1
        with:
          path: .
